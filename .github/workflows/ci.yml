name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [20, 22, 24]
        include:
          # One macOS leg (the development platform) on the .nvmrc Node.
          - os: macos-latest
            node: 22
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm test
      # Coverage gate — lines 93 / branches 80 / functions 96, a ratchet set
      # just below the real report (~95 / ~82 / ~99). Runs once on ubuntu/Node 22.
      - if: matrix.node == 22 && matrix.os == 'ubuntu-latest'
        run: npm run test:coverage
      # Production-dependency audit: fail on high+ advisories.
      - if: matrix.node == 22 && matrix.os == 'ubuntu-latest'
        run: npm audit --omit=dev --audit-level=high

  # Q2-3: Windows visibility run. continue-on-error until the first green run
  # confirms the suite is path-safe on win32; then drop the flag.
  windows:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  # S2-3: the bin launcher must print a human message (not a SyntaxError)
  # under ancient Node and exit non-zero.
  launcher-node12:
    runs-on: ubuntu-latest
    # glibc image (not -alpine): the runner-provided Node 20 that powers
    # actions/checkout is glibc-linked and fails to start under musl/alpine.
    container: node:12
    steps:
      - uses: actions/checkout@v4
      - run: |
          set +e
          out=$(node bin/servicenow-mcp-ai.cjs 2>&1)
          code=$?
          echo "$out"
          test $code -ne 0 || exit 1
          echo "$out" | grep -q "requires Node.js >= 20" || exit 1
